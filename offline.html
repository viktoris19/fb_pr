<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нет соединения</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f3f4f6;
    }
    .offline-card {
      text-align: center;
      padding: 32px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .offline-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    button {
      margin-top: 20px;
      padding: 10px 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">📡</div>
    <h1>Нет соединения с интернетом</h1>
    <p>Проверьте подключение и попробуйте снова.</p>
    <button onclick="location.reload()">🔄 Обновить</button>
  </div>
</body>
</html>
